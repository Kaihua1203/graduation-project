model:
  model_type: uncond_ldm
  pretrained_vae_model_name_or_path: /home/jupyter-wenkaihua/data3_link/kaihua.wen/download_model/stable-diffusion-v1-5
  vae_subfolder: vae
  local_files_only: true
  latent_scaling_factor: null
  unet:
    sample_size: 64
    in_channels: 4
    out_channels: 4
    layers_per_block: 2
    block_out_channels: [224, 448, 672, 896]
    down_block_types: [DownBlock2D, AttnDownBlock2D, AttnDownBlock2D, AttnDownBlock2D]
    up_block_types: [AttnUpBlock2D, AttnUpBlock2D, AttnUpBlock2D, UpBlock2D]
    norm_num_groups: 32
    attention_head_dim: 8
    dropout: 0.0
  scheduler:
    num_train_timesteps: 1000
    beta_start: 1.0e-4
    beta_end: 2.0e-2
    beta_schedule: linear
    prediction_type: epsilon
    variance_type: fixed_small
    clip_sample: false

data:
  train_manifest: /home/jupyter-wenkaihua/data3_link/kaihua.wen/dataset/M4Raw-average/train_T2.jsonl
  train_image_dir: null
  image_column: image_path
  resolution: 512
  center_crop: false
  random_flip: false
  image_interpolation_mode: bilinear
  max_train_samples: null

train:
  output_dir: /home/jupyter-wenkaihua/data3_link/kaihua.wen/code/graduation-project/2d-gen/outputs/train/uncond_ldm_m4raw_t2
  seed: 3407
  train_batch_size: 1
  num_train_epochs: 10
  max_train_steps: 2000
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-4
  scale_lr: false
  lr_scheduler: constant
  lr_warmup_steps: 0
  gradient_checkpointing: true
  mixed_precision: fp16
  max_grad_norm: 1.0
  allow_tf32: false
  dataloader_num_workers: 2
  checkpointing_steps: 200
  checkpoints_total_limit: 3
  resume_from_checkpoint: null
  optimizer:
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_weight_decay: 1.0e-2
    adam_epsilon: 1.0e-8

validation:
  num_validation_images: 4
  validation_steps: 400
  num_inference_steps: 50
  seed: 3407

logging:
  report_to: swanlab
  logging_dir: logs
  project_name: 2d-gen-uncond-ldm
  experiment_name: train_uncond_ldm_m4raw_t2

distributed:
  find_unused_parameters: false

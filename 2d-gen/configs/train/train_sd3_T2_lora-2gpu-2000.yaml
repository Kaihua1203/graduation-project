model:
  family: stable_diffusion_3
  pretrained_model_name_or_path: /home/jupyter-wenkaihua/data3_link/kaihua.wen/download_model/stable-diffusion-3-medium
  pretrained_vae_model_name_or_path: null
  revision: null
  variant: null
  local_files_only: true

data:
  train_manifest: /home/jupyter-wenkaihua/data3_link/kaihua.wen/dataset/M4Raw-average/train_T2.jsonl
  image_column: image_path
  caption_column: prompt
  resolution: 512
  center_crop: false
  random_flip: false
  image_interpolation_mode: bilinear
  max_train_samples: null

train:
  output_dir: /home/jupyter-wenkaihua/data3_link/kaihua.wen/code/graduation-project/2d-gen/outputs/train/sd3_lora
  seed: 3407
  train_batch_size: 1
  num_train_epochs: 10
  max_train_steps: 2000
  gradient_accumulation_steps: 32
  learning_rate: 1.0e-4
  scale_lr: false
  lr_scheduler: constant
  lr_warmup_steps: 0
  gradient_checkpointing: true
  mixed_precision: fp16
  snr_gamma: null
  prediction_type: null
  noise_offset: 0.0
  max_grad_norm: 1.0
  allow_tf32: false
  dataloader_num_workers: 2
  checkpointing_steps: 400
  checkpoints_total_limit: null
  resume_from_checkpoint: null
  enable_xformers_memory_efficient_attention: false
  optimizer:
    use_8bit_adam: false
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_weight_decay: 1.0e-2
    adam_epsilon: 1.0e-8
  lora:
    rank: 32
    alpha: 32
    dropout: 0.0
    target_modules:
      - attn.to_k
      - attn.to_q
      - attn.to_v
      - attn.to_out.0
      - attn.add_k_proj
      - attn.add_q_proj
      - attn.add_v_proj
      - attn.to_add_out
      - ff.net.0.proj
      - ff.net.2
      - ff_context.net.0.proj
      - ff_context.net.2
  sdxl:
    train_text_encoder: false
    enable_npu_flash_attention: false
    debug_loss: false

validation:
  validation_prompt: a T2 brain MRI slice at slice position 7, acquired with a low-field 0.3T scanner.
  num_validation_images: 4
  validation_steps: 400

logging:
  report_to: swanlab
  logging_dir: logs
  project_name: 2d-gen
  experiment_name: train_sd3_T2_lora-2gpu-2000

distributed:
  find_unused_parameters: true

model:
  family: stable_diffusion
  pretrained_path: /abs/path/to/stable-diffusion-model
  revision: null
  local_files_only: true

data:
  train_manifest: /abs/path/to/train_manifest.jsonl

train:
  output_dir: outputs/sd_lora_example
  num_epochs: 1
  batch_size: 2
  learning_rate: 1.0e-4
  max_train_steps: 20
  gradient_accumulation_steps: 1
  mixed_precision: fp16
  seed: 3407
  image_size: 512
  num_workers: 2
  log_every_n_steps: 5
  save_every_n_steps: 20
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.0
  target_modules:
    - to_k
    - to_q
    - to_v
    - to_out.0

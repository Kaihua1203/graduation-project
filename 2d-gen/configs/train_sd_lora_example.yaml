model:
  family: stable_diffusion
  pretrained_model_name_or_path: /abs/path/to/stable-diffusion-model
  pretrained_vae_model_name_or_path: null
  revision: null
  variant: null
  local_files_only: true

data:
  train_manifest: /abs/path/to/train_manifest.jsonl
  image_column: image_path
  caption_column: prompt
  resolution: 512
  center_crop: false
  random_flip: false
  image_interpolation_mode: bilinear
  max_train_samples: null

train:
  output_dir: outputs/sd_lora_example
  seed: 3407
  train_batch_size: 2
  num_train_epochs: 1
  max_train_steps: 20
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-4
  scale_lr: false
  lr_scheduler: constant
  lr_warmup_steps: 0
  gradient_checkpointing: false
  mixed_precision: fp16
  snr_gamma: null
  prediction_type: null
  noise_offset: 0.0
  max_grad_norm: 1.0
  allow_tf32: false
  dataloader_num_workers: 2
  checkpointing_steps: 20
  checkpoints_total_limit: null
  resume_from_checkpoint: null
  enable_xformers_memory_efficient_attention: false
  optimizer:
    use_8bit_adam: false
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_weight_decay: 1.0e-2
    adam_epsilon: 1.0e-8
  lora:
    rank: 8
    alpha: 16
    dropout: 0.0
    target_modules:
      - to_k
      - to_q
      - to_v
      - to_out.0
  sdxl:
    train_text_encoder: false
    enable_npu_flash_attention: false
    debug_loss: false

validation:
  validation_prompt: null
  num_validation_images: 4
  validation_epochs: 1

logging:
  report_to: swanlab
  logging_dir: logs
  log_every_n_steps: 5
  tracker_project_name: 2d-gen-train

distributed:
  find_unused_parameters: false

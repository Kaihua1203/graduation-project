defaults:
  - _self_
  - augmentations: lits_asymmetric.yaml
  - override hydra/hydra_logging: disabled
  - override hydra/job_logging: disabled

hydra:
  output_subdir: null
  run:
    dir: .

name: "simclr-lits-2d"
method: "simclr"

backbone:
  name: "resnet18"

method_kwargs:
  proj_hidden_dim: 2048
  proj_output_dim: 256
  temperature: 0.2

data:
  dataset: "custom"
  train_path: "/home/jupyter-wenkaihua/data3_link/kaihua.wen/dataset/MedSegFactory/train-Seg/LiTS2017/pretrain/images"
  val_path: null
  format: "image_folder"
  no_labels: true
  num_workers: 8

optimizer:
  name: "lars"
  batch_size: 128
  lr: 0.3
  classifier_lr: 0.1
  weight_decay: 1e-4
  kwargs:
    clip_lr: true
    eta: 0.02
    exclude_bias_n_norm: true

scheduler:
  name: "warmup_cosine"

checkpoint:
  enabled: true
  dir: "outputs/ssl/trained_models"
  frequency: 20
  keep_prev: true

auto_resume:
  enabled: true
resume_from_checkpoint: null

wandb:
  enabled: false

swanlab:
  enabled: true
  project: "2d-ssl-seg"
  experiment_name: "ssl-simclr-lits-100epochs"
  description: "solo-learn simclr pretraining on LiTS2017 unlabeled 2D slices"
  logdir: "outputs/swanlab/ssl"

seed: 3407
max_epochs: 100
devices: [0]
sync_batchnorm: false
accelerator: "gpu"
strategy: "auto"
precision: 16-mixed
